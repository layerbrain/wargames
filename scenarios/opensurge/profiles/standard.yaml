id: standard
game: opensurge
description: "Clear the act while collecting rings and keeping speed."
step_reward_min: -0.20
step_reward_max: 0.50
entries:
  - id: delta_rings
    fn: wargames.games.opensurge.rewards.delta_rings
    weight: 0.03
    when: per_step
  - id: delta_score
    fn: wargames.games.opensurge.rewards.delta_score
    weight: 0.0001
    when: per_step
  - id: progress_x
    fn: wargames.games.opensurge.rewards.progress_x
    weight: 0.002
    when: per_step
  - id: speed
    fn: wargames.games.opensurge.rewards.speed
    weight: 0.0005
    when: per_step
  - id: death_penalty
    fn: wargames.games.opensurge.rewards.death_penalty
    weight: 1.0
    when: per_step
  - id: time_penalty
    fn: wargames.games.opensurge.rewards.time_penalty
    weight: 0.00002
    when: per_step
  - id: terminal
    fn: wargames.core.missions.rewards.terminal
    weight: 5.0
    when: terminal
